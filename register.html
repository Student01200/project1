<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - مساعد</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            padding: 20px;
        }

        .register-container {
            background: var(--light-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            border: 2px solid var(--border-color);
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .register-header p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .register-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .register-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            color: var(--text-color);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--dark-bg);
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .email-preview {
            background: rgba(99, 102, 241, 0.1);
            padding: 12px 15px;
            border-radius: 8px;
            border: 2px dashed var(--primary-color);
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
        }

        .profile-image-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            background: var(--dark-bg);
        }

        .profile-image-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            background: var(--light-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .profile-image-preview img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .image-upload-btn {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .image-upload-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .skip-image-btn {
            padding: 8px 15px;
            background: transparent;
            color: var(--text-light);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .skip-image-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .register-btn {
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #ff4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            margin-bottom: 15px;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #44ff44;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            margin-bottom: 15px;
        }

        .success-message.show {
            display: block;
        }

        .register-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        .register-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .register-footer a:hover {
            text-decoration: underline;
        }

        .file-input {
            display: none;
        }

        @media (max-width: 768px) {
            .register-container {
                padding: 30px 20px;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="register-page">
        <div class="register-container">
            <div class="register-header">
                <div class="register-icon">📝</div>
                <h1>إنشاء حساب جديد</h1>
                <p>انضم إلى منصة مساعد</p>
            </div>

            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <form class="register-form" id="register-form" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">الاسم الأول *</label>
                        <input type="text" id="firstName" name="firstName" required autocomplete="given-name" oninput="updateEmailPreview()">
                    </div>
                    <div class="form-group">
                        <label for="middleName">اسم الأب *</label>
                        <input type="text" id="middleName" name="middleName" required autocomplete="additional-name" oninput="updateEmailPreview()">
                    </div>
                    <div class="form-group">
                        <label for="lastName">الاسم الأخير *</label>
                        <input type="text" id="lastName" name="lastName" required autocomplete="family-name" oninput="updateEmailPreview()">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>الإيميل الجامعي</label>
                    <div class="email-preview" id="email-preview">أدخل بياناتك أعلاه</div>
                </div>

                <div class="form-group full-width">
                    <label for="username">اسم المستخدم *</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group full-width">
                    <label for="password">كلمة المرور *</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6">
                    <small style="color: var(--text-light); font-size: 0.85rem;">يجب أن تكون كلمة المرور 6 أحرف على الأقل</small>
                </div>

                <div class="form-group full-width">
                    <label>الصورة الشخصية</label>
                    <div class="profile-image-section">
                        <div class="profile-image-preview" id="profile-preview">👤</div>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                            <label for="profile-image" class="image-upload-btn">
                                📷 اختر صورة
                            </label>
                            <input type="file" id="profile-image" class="file-input" accept="image/*" onchange="handleImageSelect(event)">
                            <button type="button" class="skip-image-btn" onclick="skipImage()">تخطي</button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="register-btn">إنشاء الحساب</button>
            </form>

            <div class="register-footer">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
                <p style="margin-top: 10px;"><a href="index.html">العودة للصفحة الرئيسية</a></p>
            </div>
        </div>
    </div>

    <script>
        let selectedImage = null;
        let useDefaultImage = false;

        function updateEmailPreview() {
            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();

            if (firstName && middleName && lastName) {
                const firstChar = firstName.charAt(0).toLowerCase();
                const middleChar = middleName.charAt(0).toLowerCase();
                const lastNameLower = lastName.toLowerCase();
                const email = `${firstChar}.${middleChar}.${lastNameLower}@ptuk.edu.ps`;
                document.getElementById('email-preview').textContent = email;
            } else {
                document.getElementById('email-preview').textContent = 'أدخل بياناتك أعلاه';
            }
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showError('حجم الصورة كبير جداً. الحد الأقصى 5 ميجابايت');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImage = e.target.result;
                    useDefaultImage = false;
                    const preview = document.getElementById('profile-preview');
                    preview.innerHTML = `<img src="${selectedImage}" alt="Profile">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function skipImage() {
            selectedImage = null;
            useDefaultImage = true;
            const preview = document.getElementById('profile-preview');
            preview.innerHTML = '👤';
            document.getElementById('profile-image').value = '';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
        }

        function showSuccess(message) {
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }

        function generateEmail(firstName, middleName, lastName) {
            const firstChar = firstName.charAt(0).toLowerCase();
            const middleChar = middleName.charAt(0).toLowerCase();
            const lastNameLower = lastName.toLowerCase();
            return `${firstChar}.${middleChar}.${lastNameLower}@ptuk.edu.ps`;
        }

        function handleRegister(event) {
            event.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const middleName = document.getElementById('middleName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // التحقق من البيانات
            if (!firstName || !middleName || !lastName || !username || !password) {
                showError('يرجى ملء جميع الحقول المطلوبة');
                return;
            }

            if (password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            // التحقق من عدم وجود اسم مستخدم مكرر
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            if (users.find(u => u.username === username)) {
                showError('اسم المستخدم موجود بالفعل. يرجى اختيار اسم آخر');
                return;
            }

            // إنشاء الحساب
            const email = generateEmail(firstName, middleName, lastName);
            const profileImage = selectedImage || 'default'; // 'default' يعني استخدام الصورة الافتراضية

            const newUser = {
                username: username,
                password: password,
                firstName: firstName,
                middleName: middleName,
                lastName: lastName,
                email: email,
                profileImage: profileImage,
                points: 0,
                subscription: false,
                myCourses: [],
                maxCourses: 3,
                paidSlots: 0,
                registeredAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('registeredUsers', JSON.stringify(users));

            showSuccess('تم إنشاء الحساب بنجاح! جاري التوجيه...');
            
            // تسجيل الدخول تلقائياً
            setTimeout(() => {
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify({
                    username: newUser.username,
                    email: newUser.email,
                    firstName: newUser.firstName,
                    lastName: newUser.lastName,
                    middleName: newUser.middleName,
                    profileImage: newUser.profileImage,
                    points: newUser.points,
                    subscription: newUser.subscription,
                    myCourses: newUser.myCourses,
                    maxCourses: newUser.maxCourses,
                    paidSlots: newUser.paidSlots
                }));
                window.location.href = 'user-dashboard.html';
            }, 1500);
        }
    </script>
</body>

</html>
